name: 🔄 Auto Update Worker

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 1 * * *"  # 🕐 每天凌晨1点自动运行
  workflow_dispatch:      # 🖐️ 手动触发（强制更新）

permissions:
  contents: write
  actions: write

jobs:
  update:
    name: 🚀 同步和优化 Worker 文件
    runs-on: ubuntu-latest
    steps:
      - name: 📥 初始化代码仓库（带权限修复）
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: false  # 关键：禁用自动凭证，后面手动设置

      - name: 🔧 配置 Git & 安装工具
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase false
          # 强制用 token 认证
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          npm install -g terser javascript-obfuscator

      - name: 🔍 检查文件状态
        id: check_files
        run: |
          echo "🔍 $(date '+%Y-%m-%d %H:%M:%S') - 检查文件状态..."
          if [[ -f "version.txt" ]]; then
            LOCAL_VERSION=$(cat version.txt)
            echo "✅ version.txt 存在，版本: $LOCAL_VERSION"
            echo "HAS_VERSION=true" >> $GITHUB_ENV
          else
            echo "📝 version.txt 不存在"
            echo "HAS_VERSION=false" >> $GITHUB_ENV
          fi
          # 文件缺失强制更新
          if [[ "$HAS_VERSION" == "false" || ! -f "source.js" || ! -f "_worker.js" ]]; then
            echo "🔄 文件缺失，强制更新"
            echo "FORCE_UPDATE=true" >> $GITHUB_ENV
          else
            echo "FORCE_UPDATE=false" >> $GITHUB_ENV
          fi
          # 标记手动触发
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "🖐️ 手动触发模式"
            echo "IS_MANUAL=true" >> $GITHUB_ENV
          else
            echo "IS_MANUAL=false" >> $GITHUB_ENV
          fi

      - name: 🌐 下载远程文件（带重试）
        id: remote_info
        run: |
          echo "🌍 $(date '+%Y-%m-%d %H:%M:%S') - 下载远程文件..."
          RAW_URL="https://raw.githubusercontent.com/wpyok168/cfnew/refs/heads/main/_worker.js"
          for i in {1..3}; do
            curl -f -s --connect-timeout 10 --max-time 30 "$RAW_URL" -o /tmp/remote_worker.js
            if [[ -f /tmp/remote_worker.js && $(stat -c%s /tmp/remote_worker.js 2>/dev/null || stat -f%z /tmp/remote_worker.js 2>/dev/null) -gt 1000 ]]; then
              FILE_HASH=$(sha256sum /tmp/remote_worker.js | awk '{print $1}')
              echo "✅ 下载成功，HASH: ${FILE_HASH:0:16}"
              echo "REMOTE_VERSION=$FILE_HASH" >> $GITHUB_ENV
              break
            fi
            [[ $i -eq 3 ]] && { echo "❌ 下载失败"; exit 1; }
            sleep 5
          done

      - name: 📊 更新决策（手动=强制）
        id: update_decision
        run: |
          echo "📊 $(date '+%Y-%m-%d %H:%M:%S') - 决策是否更新..."
          if [[ "$IS_MANUAL" == "true" || "$FORCE_UPDATE" == "true" ]]; then
            echo "🔄 手动/文件缺失 → 强制更新"
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          elif [[ "$HAS_VERSION" == "true" && "$LOCAL_VERSION" == "$REMOTE_VERSION" ]]; then
            echo "🎉 版本一致，无需更新"
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          else
            echo "🔄 有新版本，需要更新"
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          fi

      - name: ⬇️ 保存原始文件
        if: env.UPDATE_NEEDED == 'true'
        run: |
          cp /tmp/remote_worker.js source.js
          echo "✅ source.js 已保存"

      - name: 🔧 压缩+混淆
        if: env.UPDATE_NEEDED == 'true'
        run: |
          echo "🔧 压缩混淆中..."
          terser /tmp/remote_worker.js --compress --mangle -o _worker.js
          # 失败 fallback
          [[ ! -f _worker.js ]] && cp /tmp/remote_worker.js _worker.js
          ls -lh _worker.js source.js

      - name: 📝 【强制提交】（手动必推）
        if: env.UPDATE_NEEDED == 'true'
        run: |
          echo "$REMOTE_VERSION" > version.txt
          # 强制加入所有要更新的文件
          git add -f _worker.js version.txt source.js
          # 手动触发：强制空提交也推
          if [[ "$IS_MANUAL" == "true" ]]; then
            git commit --allow-empty -m "🔄 Force Update (Manual)
            • 版本: ${REMOTE_VERSION:0:16}
            • 手动触发强制更新
            • $(date '+%Y-%m-%d %H:%M:%S')"
          else
            git commit -m "🔄 Auto Update
            • 版本: ${REMOTE_VERSION:0:16}
            • $(date '+%Y-%m-%d %H:%M:%S')"
          fi
          # 强制推送
          git push --force-with-lease origin main
          echo "✅ 已强制推送到仓库！"

      - name: 📦 打包 Release
        if: env.UPDATE_NEEDED == 'true'
        run: zip -r pages.zip _worker.js

      - name: 🚀 发布到 Releases
        uses: softprops/action-gh-release@v2
        if: env.UPDATE_NEEDED == 'true'
        with:
          tag_name: auto-${{ github.sha }}
          name: Worker 自动发布
          body: |
            ✅ 已同步最新代码
            ✅ 已混淆+压缩
            📦 包含 _worker.js
          files: pages.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🎉 更新完成
        if: env.UPDATE_NEEDED == 'true'
        run: echo "🎉 更新完成并已推送！"
      - name: 😴 无需更新
        if: env.UPDATE_NEEDED == 'false'
        run: echo "😴 当前已是最新版本"

  cleanup:
    name: 🧹 清理旧记录
    runs-on: ubuntu-latest
    needs: update
    if: always()
    permissions:
      actions: write
    steps:
      - uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
