name: 🔄 Auto Update Worker

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 1 * * *"  # 🕐 每天凌晨1点自动运行
  workflow_dispatch:      # 🖐️ 手动触发（强制推送更新至仓库）

permissions:
  contents: write

jobs:
  update:
    name: 🚀 同步和优化 Worker 文件
    runs-on: ubuntu-latest
    steps:
      - name: 📥 初始化代码仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 配置 Git 和安装依赖
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase false
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          echo "📦 安装工具..."
          npm install -g terser javascript-obfuscator

      - name: 🔍 检查文件状态
        id: check_files
        run: |
          echo "🔍 检查文件状态..."
          
          if [[ -f "version.txt" ]]; then
            LOCAL_VERSION=$(cat version.txt)
            echo "✅ version.txt 存在，版本: $LOCAL_VERSION"
            echo "HAS_VERSION=true" >> $GITHUB_ENV
          else
            echo "📝 version.txt 不存在"
            echo "HAS_VERSION=false" >> $GITHUB_ENV
          fi
          
          if [[ "$HAS_VERSION" == "false" || ! -f "source.js" || ! -f "_worker.js" ]]; then
            echo "🔄 文件缺失，强制更新"
            echo "FORCE_UPDATE=true" >> $GITHUB_ENV
          else
            echo "FORCE_UPDATE=false" >> $GITHUB_ENV
          fi
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "🖐️ 手动触发模式"
            echo "IS_MANUAL=true" >> $GITHUB_ENV
          else
            echo "IS_MANUAL=false" >> $GITHUB_ENV
          fi

      - name: 🌐 获取远程文件信息
        id: remote_info
        run: |
          echo "🌍 下载远程文件..."
          RAW_URL="https://raw.githubusercontent.com/wpyok168/cfnew/refs/heads/main/_worker.js"
          
          for i in {1..3}; do
            curl -f -s -o /tmp/remote_worker.js "$RAW_URL"
            FILE_SIZE=$(stat -c%s /tmp/remote_worker.js 2>/dev/null || stat -f%z /tmp/remote_worker.js 2>/dev/null)
            if [[ $FILE_SIZE -gt 1000 ]]; then
              FILE_HASH=$(sha256sum /tmp/remote_worker.js | awk '{print $1}')
              echo "✅ 下载成功"
              echo "REMOTE_VERSION=$FILE_HASH" >> $GITHUB_ENV
              break
            fi
            [[ $i -eq 3 ]] && exit 1
            sleep 3
          done

      - name: 📊 更新决策
        id: update_decision
        run: |
          if [[ "$IS_MANUAL" == "true" || "$FORCE_UPDATE" == "true" ]]; then
            echo "🔄 强制更新"
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          elif [[ -f "version.txt" && "$(cat version.txt)" == "$REMOTE_VERSION" ]]; then
            echo "🎉 版本一致"
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          else
            echo "🔄 需要更新"
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          fi

      - name: ⬇️ 保存原始文件
        if: env.UPDATE_NEEDED == 'true'
        run: |
          cp /tmp/remote_worker.js source.js
          echo "✅ source.js 已保存"

          # ==============================================
          # 🔥 手动触发：强制修改 source.js
          # ==============================================
          if [[ "$IS_MANUAL" == "true" ]]; then
            echo "🖐️ 手动触发：强制修改 source.js"
            echo "" >> source.js
            echo "// MANUAL FORCE UPDATE | $(date '+%Y-%m-%d %H:%M:%S')" >> source.js
          fi

      - name: 🔧 代码混淆与压缩
        if: env.UPDATE_NEEDED == 'true'
        run: |
          echo "🔧 压缩混淆..."
          terser /tmp/remote_worker.js --compress --mangle --output _worker.js
          [[ ! -f _worker.js ]] && cp /tmp/remote_worker.js _worker.js

          # ==============================================
          # 🔥 手动触发：强制修改 _worker.js
          # ==============================================
          if [[ "$IS_MANUAL" == "true" ]]; then
            echo "🖐️ 手动触发：强制修改 _worker.js"
            echo "" >> _worker.js
            echo "// MANUAL FORCE UPDATE | $(date '+%Y-%m-%d %H:%M:%S')" >> _worker.js
          fi

      - name: 📝 强制提交 + 推送
        if: env.UPDATE_NEEDED == 'true'
        run: |
          echo "$REMOTE_VERSION" > version.txt
          git add -A
          
          if [[ "$IS_MANUAL" == "true" ]]; then
            git commit -m "🔄 FORCE UPDATE (手动触发)
            • source.js 已强制更新
            • _worker.js 已强制更新
            • 版本：${REMOTE_VERSION:0:16}
            • 时间：$(date '+%Y-%m-%d %H:%M:%S')" --allow-empty
          else
            git commit -m "🔄 Auto Update Worker
            • 版本：${REMOTE_VERSION:0:16}
            • 时间：$(date '+%Y-%m-%d %H:%M:%S')" --allow-empty
          fi
          
          git push
          echo "✅ 全部推送完成！"

      - name: 📦 打包
        run: zip pages.zip _worker.js
        if: env.UPDATE_NEEDED == 'true'

      - name: 🚀 发布 Releases
        uses: softprops/action-gh-release@v2
        if: env.UPDATE_NEEDED == 'true'
        with:
          tag_name: auto-${{ github.sha }}
          name: Worker 自动发布
          body: "✅ 已同步最新代码\n✅ 已混淆+压缩\n📦 包含 _worker.js"
          files: pages.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🎉 完成
        if: env.UPDATE_NEEDED == 'true'
        run: echo "🎉 更新完成！"
      - name: 😴 无需更新
        if: env.UPDATE_NEEDED == 'false'
        run: echo "😴 已是最新版本"

  cleanup:
    name: 🧹 清理记录
    runs-on: ubuntu-latest
    needs: update
    if: always()
    permissions:
      actions: write
    steps:
      - uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
