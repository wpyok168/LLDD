name: Auto Update Worker

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 1 * * *"  # 每天凌晨1点自动执行
  workflow_dispatch:      # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    name: Update Worker
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 配置Git环境并安装依赖工具
      - name: Setup Git and Dependencies
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase false
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          npm install -g terser javascript-obfuscator

      # 检查本地文件与触发方式
      - name: Check File Status
        run: |
          if [ -f version.txt ]; then
            echo "HAS_VERSION=true" >> $GITHUB_ENV
          else
            echo "HAS_VERSION=false" >> $GITHUB_ENV
          fi

          if [ "$HAS_VERSION" = "false" ] || [ ! -f source.js ] || [ ! -f _worker.js ]; then
            echo "FORCE_UPDATE=true" >> $GITHUB_ENV
          else
            echo "FORCE_UPDATE=false" >> $GITHUB_ENV
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IS_MANUAL=true" >> $GITHUB_ENV
          else
            echo "IS_MANUAL=false" >> $GITHUB_ENV
          fi

      # 下载远程源文件
      - name: Download Remote File
        run: |
          RAW_URL="https://raw.githubusercontent.com/wpyok168/cfnew/refs/heads/main/_worker.js"
          for i in {1..3}; do
            curl -f -s -o /tmp/remote_worker.js "$RAW_URL"
            FILE_SIZE=$(stat -c%s /tmp/remote_worker.js 2>/dev/null || stat -f%z /tmp/remote_worker.js 2>/dev/null)
            if [ "$FILE_SIZE" -gt 1000 ]; then
              FILE_HASH=$(sha256sum /tmp/remote_worker.js | awk '{print $1}')
              echo "REMOTE_VERSION=$FILE_HASH" >> $GITHUB_ENV
              break
            fi
            if [ $i -eq 3 ]; then
              exit 1
            fi
            sleep 3
          done

      # 判断是否需要更新
      - name: Determine Update
        run: |
          if [ "$IS_MANUAL" = "true" ] || [ "$FORCE_UPDATE" = "true" ]; then
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          elif [ -f version.txt ] && [ "$(cat version.txt)" = "$REMOTE_VERSION" ]; then
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          else
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          fi

      # 保存源文件，手动触发时强制修改内容
      - name: Save Source File
        if: env.UPDATE_NEEDED == 'true'
        run: |
          cp /tmp/remote_worker.js source.js
          if [ "$IS_MANUAL" = "true" ]; then
            echo "" >> source.js
            echo "// MANUAL UPDATE $(date '+%Y-%m-%d %H:%M:%S')" >> source.js
          fi

      # 压缩混淆，手动触发时强制修改输出文件
      - name: Compress and Obfuscate
        if: env.UPDATE_NEEDED == 'true'
        run: |
          terser /tmp/remote_worker.js --compress --mangle -o _worker.js
          if [ ! -f _worker.js ]; then
            cp /tmp/remote_worker.js _worker.js
          fi
          if [ "$IS_MANUAL" = "true" ]; then
            echo "" >> _worker.js
            echo "// MANUAL UPDATE $(date '+%Y-%m-%d %H:%M:%S')" >> _worker.js
          fi

      # 提交并推送到仓库
      - name: Commit and Push
        if: env.UPDATE_NEEDED == 'true'
        run: |
          echo "$REMOTE_VERSION" > version.txt
          git add -A
          if [ "$IS_MANUAL" = "true" ]; then
            git commit -m "Force update manual" --allow-empty
          else
            git commit -m "Auto update worker" --allow-empty
          fi
          git push

      # 打包zip
      - name: Zip File
        if: env.UPDATE_NEEDED == 'true'
        run: zip pages.zip _worker.js

      # 发布到Release
      - name: Create Release
        if: env.UPDATE_NEEDED == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.sha }}
          name: Auto Update
          files: pages.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 部署到Cloudflare（有token才执行，无token不报错）
      - name: Deploy to Cloudflare
        if: env.UPDATE_NEEDED == 'true' && env.CF_API_TOKEN != ''
        run: |
          npm install -g wrangler
          wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  # 清理旧的运行记录
  cleanup:
    runs-on: ubuntu-latest
    needs: update
    if: always()
    permissions:
      actions: write
    steps:
      - name: Delete Old Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
